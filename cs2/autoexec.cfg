// CS2 Settings - charlie wilson
//
// Move to "Program Files (x86)\Steam\steamapps\common\Counter-Strike Global Offensive\game\csgo\cfg\autoexec.cfg"
// and add "+exec autoexec.cfg" to your CS2 launch options

echo "Loaded chwilson config"

// Crosshair
cl_crosshairstyle "4"
cl_crosshair_t "0"
cl_crosshaircolor_r "0"
cl_crosshaircolor_g "255"
cl_crosshaircolor_b "0"
cl_crosshairsize "1.3"
cl_crosshairthickness "1"
cl_crosshairgap "-2.8"
cl_crosshair_drawoutline "0"
cl_crosshair_outlinethickness "1"
cl_crosshair_recoil "0"
cl_crosshairusealpha "1"
cl_crosshairalpha "175"
cl_crosshairdot "0"

// Sensitivity
sensitivity "0.6"

// Hud
cl_hud_color "9" // Green

// Radar
cl_hud_radar_scale 1.3
cl_radar_scale 0.4
cl_radar_always_centered 0
cl_radar_rotate 1
cl_radar_square_always 0

// Viewmodel (default)
viewmodel_fov 66
viewmodel_offset_x 2
viewmodel_offset_y -2
viewmodel_offset_z -1.5
cl_righthand 1

// Volume
volume "1"

// Miscellaneous
cl_autohelp 1
cl_showhelp 0
fps_max 178

// Binds
unbindall //Remove all to rebind

// UI
bind "ESCAPE" "cancelselect"
bind "`" "toggleconsole"
bind "TAB" "+showscores"

//Mouse
bind "MOUSE_X" "yaw"
bind "MOUSE_Y" "pitch"
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "MOUSE3" "player_ping"

//Movement
bind "w" "+forward"
bind "a" "+left"
bind "s" "+back"
bind "d" "+right"
bind "e" "+use"

bind "SPACE" "+duck"
bind "MWHEELDOWN" "+jump"
bind "MWHEELUP" "+jump"
bind "CTRL" "+duck"
bind "SHIFT" "+sprint"

//Interaction
bind "r" "+reload"
bind "f" "+lookatweapon"
bind "g" "drop"
bind "q" "lastinv"
bind "b" "buymenu"
bind "DEL" "sellbackall"
bind "h" "switchhands"
bind "m" "teammenu"

//Slots
bind "ALT" "slot1" //Primary (mouse thumb)
bind "MOUSE5" "slot2" //Secondary
bind "MOUSE4" "slot3" //Knife

bind "3" "slot9" //Decoy
bind "4" "slot11" //Zeus
bind "5" "slot5" //Bomb

bind "z" "slot8" //Smoke
bind "x" "slot6" //Frag
bind "c" "slot7" //Flash
bind "v" "slot10" //Molly

//Communication
bind "y" "messagemode"
bind "u" "messagemode2"
bind "j" "+spray_menu"
bind "t" "+voicerecord"

//Functions
alias "expertbots" "bot_kick all; bot_add expert; bot_add expert; bot_add expert; bot_add expert; bot_add expert; bot_add expert; bot_add expert; bot_add expert; bot_add expert; mp_restartgame 5;"
